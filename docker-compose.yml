# ============================================================================
# WTH Drive Rentals — Local Development Stack
# ============================================================================

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wdr_dev
      POSTGRES_USER: wdr
      POSTGRES_PASSWORD: wdr_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  iam-service:
    build:
      context: .
      dockerfile: services/iam-service/Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://wdr:wdr_dev_password@postgres:5432/wdr_dev
      JWT_SECRET: wdr-dev-secret-do-not-use-in-production
    depends_on:
      - postgres
      - redis

  fleet-service:
    build:
      context: .
      dockerfile: services/fleet-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://wdr:wdr_dev_password@postgres:5432/wdr_dev
      JWT_SECRET: wdr-dev-secret-do-not-use-in-production
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: